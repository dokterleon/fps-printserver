<!doctype html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FPS Installatie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090c;--s1:#111318;--s2:#181b22;--b2:rgba(255,255,255,.13);--t:#f0f0ee;--muted:#6b7280;--y:#FFE000;--red:#ef4444;--rb:rgba(239,68,68,.13)}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:var(--s1);border:1px solid var(--b2);border-radius:18px;padding:36px 32px;width:100%;max-width:380px}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-bolt{width:38px;height:38px;border-radius:10px;background:var(--y);display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-name{font-size:17px;font-weight:700}
.logo-sub{font-size:11px;color:var(--muted)}
.title{font-size:18px;font-weight:700;margin-bottom:6px}
.desc{font-size:13px;color:var(--muted);margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.field input{background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:11px 14px;color:var(--t);font-size:15px;outline:none;width:100%}
.field input:focus{border-color:rgba(255,224,0,.5)}
.btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:700;background:var(--y);color:#0a0a00;border:none;cursor:pointer;margin-top:4px}
.err{background:var(--rb);border:1px solid rgba(239,68,68,.2);color:var(--red);border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:14px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-bolt">⚡</div>
    <div>
      <div class="logo-name">Flitshokje Print Server</div>
      <div class="logo-sub">Installatie toegang</div>
    </div>
  </div>
  <div class="title">Installatie wachtwoord</div>
  <div class="desc">Voer het FPS installatie wachtwoord in om door te gaan.</div>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="field">
      <label>Wachtwoord</label>
      <input type="password" name="install_pw" autofocus placeholder="••••••••••">
    </div>
    <button class="btn" type="submit">Doorgaan →</button>
  </form>
</div>
</body>
</html>
